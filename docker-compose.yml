services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tcoffline
      POSTGRES_PASSWORD: tcoffline
      POSTGRES_DB: tcoffline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcoffline"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    environment:
      - DATABASE_URL=postgresql://tcoffline:tcoffline@db:5432/tcoffline
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # --- Tests ---
  # docker compose --profile test run --rm test
  test:
    build: .
    volumes:
      - ./tests:/app/tests
      - ./app:/app/app
      - ./pytest.ini:/app/pytest.ini
    environment:
      - DATABASE_URL=postgresql://tcoffline:tcoffline@db:5432/tcoffline_test
      - LOG_LEVEL=WARNING
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["python", "-m", "pytest"]
    command: ["tests/", "-v", "--tb=short", "-o", "asyncio_mode=auto"]
    profiles: [test]

volumes:
  pgdata:
